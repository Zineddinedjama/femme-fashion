<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - {% block title %}Dashboard{% endblock %} - Femme Fashion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>
    <header class="admin-header-bar">
        <div class="container header-inner">
            <a href="{{ url_for('admin_dashboard') }}" class="logo">Admin - Femme Fashion</a>
            <nav>
                <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
                <a href="{{ url_for('admin_products') }}">Produits</a>
                <a href="{{ url_for('admin_orders') }}">Commandes</a>
                <a href="{{ url_for('admin_logout') }}">D&eacute;connexion</a>
                <a href="{{ url_for('index') }}">Site &rarr;</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
